name: Build DouX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ── Job 1: DeTok standalone dylib (Ghost + Visual, no Ellekit) ───────────────
  build-detok:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install signing tools
        run: brew install ldid

      - name: Build DeTok.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun clang \
            -arch arm64 -arch arm64e \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -fobjc-arc \
            -framework Foundation \
            -framework UIKit \
            -framework AVFoundation \
            -framework UniformTypeIdentifiers \
            -framework Photos \
            -framework LocalAuthentication \
            -dynamiclib \
            -install_name @executable_path/DeTok.dylib \
            -o DeTok.dylib \
            DouX-main/hooks/ghost_standalone.m \
            DouX-main/hooks/visual_standalone.m \
            DouX-main/hooks/features_standalone.m
          ldid -S DeTok.dylib
          echo "Built: $(ls -lh DeTok.dylib)"
          file DeTok.dylib

      - name: Package inject kit
        run: |
          mkdir -p detok_kit
          cp DeTok.dylib detok_kit/
          cp scripts/inject_ipa.py detok_kit/
          # Patch inject_ipa.py to use DeTok.dylib name
          sed -i '' 's/DouX.dylib/DeTok.dylib/g' detok_kit/inject_ipa.py || \
            sed -i 's/DouX.dylib/DeTok.dylib/g' detok_kit/inject_ipa.py
          sed -i '' 's/DYLIB_NAME.*=.*"DouX.dylib"/DYLIB_NAME = "DeTok.dylib"/' detok_kit/inject_ipa.py 2>/dev/null || true
          zip -r DeTok-inject-kit.zip detok_kit/
          echo "Kit: $(du -sh DeTok-inject-kit.zip)"

      - name: Upload DeTok.dylib
        uses: actions/upload-artifact@v4
        with:
          name: DeTok-dylib
          path: DeTok.dylib

      - name: Upload inject kit
        uses: actions/upload-artifact@v4
        with:
          name: DeTok-inject-kit
          path: DeTok-inject-kit.zip

  # ── Job 2: Full DouX via Theos (jailbreak .deb) ───────────────────────────────
  build-full:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ldid xz make dpkg

      - name: Install Theos
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -LO https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
          tar xf iPhoneOS16.5.sdk.tar.xz -C $THEOS/sdks

      - name: Init submodules
        working-directory: DouX-main
        run: |
          rm -rf libs/JGProgressHUD
          git clone https://github.com/kunihir0/JGProgressHUD.git libs/JGProgressHUD

      - name: Build
        env:
          THEOS: ${{ github.workspace }}/theos
        working-directory: DouX-main
        run: |
          chmod +x layout/DEBIAN/preinst 2>/dev/null || true
          gmake package FINALPACKAGE=1

      - name: Extract dylib
        working-directory: DouX-main
        run: |
          DEB=$(ls packages/*.deb | head -1)
          dpkg-deb -x "$DEB" deb_out
          DYLIB=$(find deb_out -name "*.dylib" | head -1)
          cp "$DYLIB" DouX.dylib
          ls -lh DouX.dylib

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: DouX-deb
          path: DouX-main/packages/*.deb
          if-no-files-found: warn
