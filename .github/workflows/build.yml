name: Build DouX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ── Job 1: Ghost standalone dylib (no Ellekit needed) ────────────────────────
  build-ghost:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build GhostMode.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun clang \
            -arch arm64 -arch arm64e \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -fobjc-arc \
            -framework Foundation -framework UIKit \
            -dynamiclib \
            -install_name @executable_path/GhostMode.dylib \
            -o GhostMode.dylib \
            DouX-main/hooks/ghost_standalone.m
          xcrun ldid -S GhostMode.dylib
          echo "Built: $(ls -lh GhostMode.dylib)"
          file GhostMode.dylib

      - name: Upload GhostMode.dylib
        uses: actions/upload-artifact@v4
        with:
          name: GhostMode-dylib
          path: GhostMode.dylib

  # ── Job 2: Full DouX via Theos (jailbreak .deb) ───────────────────────────────
  build-full:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ldid xz make dpkg

      - name: Install Theos
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -LO https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
          tar xf iPhoneOS16.5.sdk.tar.xz -C $THEOS/sdks

      - name: Init submodules
        working-directory: DouX-main
        run: |
          rm -rf libs/JGProgressHUD
          git clone https://github.com/kunihir0/JGProgressHUD.git libs/JGProgressHUD

      - name: Build
        env:
          THEOS: ${{ github.workspace }}/theos
        working-directory: DouX-main
        run: |
          chmod +x layout/DEBIAN/preinst 2>/dev/null || true
          gmake package FINALPACKAGE=1

      - name: Extract dylib
        working-directory: DouX-main
        run: |
          DEB=$(ls packages/*.deb | head -1)
          echo "Found deb: $DEB"
          dpkg-deb -x "$DEB" deb_out
          DYLIB=$(find deb_out -name "*.dylib" | head -1)
          echo "Found dylib: $DYLIB"
          cp "$DYLIB" DouX.dylib
          ls -lh DouX.dylib

      - name: Package inject kit
        working-directory: DouX-main
        run: |
          mkdir -p inject_kit
          cp DouX.dylib inject_kit/
          cp ../scripts/inject_ipa.py inject_kit/
          cp ../scripts/README.txt inject_kit/ 2>/dev/null || echo "no README"
          zip -r DouX-inject-kit.zip inject_kit/
          echo "Kit size: $(du -sh DouX-inject-kit.zip)"

      - name: Upload inject kit
        uses: actions/upload-artifact@v4
        with:
          name: DouX-inject-kit
          path: DouX-main/DouX-inject-kit.zip

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: DouX-deb
          path: DouX-main/packages/*.deb
          if-no-files-found: warn
