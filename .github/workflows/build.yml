name: Build DouX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ldid xz make dpkg

      - name: Install Theos
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -LO https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
          tar xf iPhoneOS16.5.sdk.tar.xz -C $THEOS/sdks

      - name: Init submodules
        working-directory: DouX-main
        run: |
          rm -rf libs/JGProgressHUD
          git clone https://github.com/kunihir0/JGProgressHUD.git libs/JGProgressHUD

      - name: Build
        env:
          THEOS: ${{ github.workspace }}/theos
        working-directory: DouX-main
        run: |
          chmod +x layout/DEBIAN/preinst 2>/dev/null || true
          gmake package FINALPACKAGE=1

      - name: Extract dylib
        working-directory: DouX-main
        run: |
          DEB=$(ls packages/*.deb | head -1)
          echo "Found deb: $DEB"
          # Use dpkg-deb (most reliable on macOS with brew dpkg)
          dpkg-deb -x "$DEB" deb_out
          DYLIB=$(find deb_out -name "*.dylib" | head -1)
          echo "Found dylib: $DYLIB"
          cp "$DYLIB" DouX.dylib
          ls -lh DouX.dylib

      - name: Download Ellekit
        continue-on-error: true
        run: |
          mkdir -p ellekit_out
          # ElleKit is distributed via Havoc repo, no GitHub releases
          # Try to get from the last known working CI artifact URL pattern
          API=$(curl -s "https://api.github.com/repos/opa334/ellekit/releases?per_page=1")
          URL=$(echo "$API" | python3 -c "
import sys,json
data=json.load(sys.stdin)
if data:
    for a in data[0].get('assets',[]):
        if a['name'].endswith('.deb'):
            print(a['browser_download_url'])
            break
" 2>/dev/null)
          if [ -n "$URL" ]; then
            echo "Downloading: $URL"
            curl -fL "$URL" -o ellekit.deb && dpkg-deb -x ellekit.deb ellekit_out || true
          else
            echo "No Ellekit release found — kit will be built without Ellekit"
          fi
          echo "Ellekit contents:"
          find ellekit_out -type f | head -20

      - name: Package inject kit
        working-directory: DouX-main
        run: |
          mkdir -p inject_kit/Ellekit.framework
          cp DouX.dylib inject_kit/
          # Find and copy the substrate/ellekit binary
          SUBS=$(find ../ellekit_out -name "CydiaSubstrate" -not -type d | head -1)
          if [ -z "$SUBS" ]; then
            SUBS=$(find ../ellekit_out -name "*.dylib" | head -1)
          fi
          if [ -n "$SUBS" ]; then
            cp "$SUBS" inject_kit/Ellekit.framework/CydiaSubstrate
            echo "Bundled: $SUBS"
          else
            echo "Warning: Ellekit binary not found"
          fi
          cp ../scripts/inject_ipa.py inject_kit/
          cp ../scripts/README.txt inject_kit/
          zip -r DouX-inject-kit.zip inject_kit/
          echo "Kit size: $(du -sh DouX-inject-kit.zip)"

      - name: Upload inject kit (Sideloadly / AltStore)
        uses: actions/upload-artifact@v4
        with:
          name: DouX-inject-kit
          path: DouX-main/DouX-inject-kit.zip

      - name: Upload .deb (jailbreak)
        uses: actions/upload-artifact@v4
        with:
          name: DouX-deb
          path: DouX-main/packages/*.deb
          if-no-files-found: warn
