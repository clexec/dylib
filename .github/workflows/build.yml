name: Build DeTok

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-inject:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install ldid
          python3 -m pip install lief --break-system-packages

      - name: Build DeTok.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun clang \
            -arch arm64 -arch arm64e \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -fobjc-arc \
            -framework Foundation \
            -framework UIKit \
            -framework AVFoundation \
            -framework UniformTypeIdentifiers \
            -framework Photos \
            -framework LocalAuthentication \
            -dynamiclib \
            -install_name @executable_path/DeTok.dylib \
            -o DeTok.dylib \
            DouX-main/hooks/ghost_standalone.m \
            DouX-main/hooks/visual_standalone.m \
            DouX-main/hooks/features_standalone.m
          ldid -S DeTok.dylib
          echo "DeTok.dylib: $(ls -lh DeTok.dylib)"

      - name: Build RXPatch.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun clang \
            -arch arm64 -arch arm64e \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -fobjc-arc \
            -framework Foundation \
            -framework UIKit \
            -dynamiclib \
            -install_name @executable_path/Frameworks/RXPatch.dylib \
            -o RXPatch.dylib \
            DouX-main/hooks/rxpatch_standalone.m
          ldid -S RXPatch.dylib
          echo "RXPatch.dylib: $(ls -lh RXPatch.dylib)"

      - name: Upload DeTok.dylib
        uses: actions/upload-artifact@v4
        with:
          name: DeTok-dylib
          path: DeTok.dylib

      - name: Upload RXPatch.dylib
        uses: actions/upload-artifact@v4
        with:
          name: RXPatch-dylib
          path: RXPatch.dylib

      - name: Package inject kit
        run: |
          mkdir -p detok_kit
          cp DeTok.dylib detok_kit/
          cp RXPatch.dylib detok_kit/
          cp scripts/inject_ipa.py detok_kit/
          printf 'DeTok + RXPatch Inject Kit\n==========================\nRequirements: pip install lief\n\nFor DeTok (our TikTok tweak):\n  python3 inject_ipa.py TikTok.ipa DeTok.dylib DeTok-patched.ipa\n\nFor RXTikTok (patch key prompt):\n  python3 inject_ipa.py RXTikTok.ipa RXPatch.dylib RX-patched.ipa\n  (RXPatch.dylib goes into Frameworks/ folder)\n' > detok_kit/README.txt
          zip -r inject-kit.zip detok_kit/

      - name: Upload inject kit
        uses: actions/upload-artifact@v4
        with:
          name: inject-kit
          path: inject-kit.zip
          retention-days: 30

      - name: Summary
        run: |
          echo "## Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| DeTok.dylib | $(du -sh DeTok.dylib | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| RXPatch.dylib | $(du -sh RXPatch.dylib | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
